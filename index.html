<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steam Labs Prototype Testing Facility</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d0d0f;
        color: #f2f2f2;
        text-align: center;
        overflow-x: hidden;
    }

    .container {
        max-width: 800px;
        margin: auto;
        padding: 40px;
    }

    h1 {
        color: #ffd166;
        margin-bottom: 10px;
    }

    #status {
        font-size: 1.2em;
        margin-top: 20px;
        color: #06d6a0;
        min-height: 40px;
    }

    .bar {
        width: 100%;
        background: #222;
        border-radius: 10px;
        margin-top: 20px;
        overflow: hidden;
    }

    .progress {
        width: 0%;
        height: 20px;
        background: #4cc9f0;
        transition: width 0.5s;
    }

    #result {
        display: none;
        margin-top: 30px;
        font-size: 1.4em;
        color: #ffd166;
    }

    #intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: #ffd166;
    font-size: 1.4em;
    animation: fadeOut 2s ease forwards;
    animation-delay: 2.5s;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}
    button {
        margin-top: 20px;
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ff4d4d;
        color: white;
        font-size: 16px;
    }

    button:hover {
        background: #ff1a1a;
    }

    .popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1e1e1e;
        padding: 25px;
        border-radius: 10px;
        border: 2px solid #ff4d4d;
        z-index: 1000;
    }

    .overlay {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0,0,0,0.6);
        z-index: 999;
    }

    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        top: -10px;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div id="intro">
    <div id="introText">Connecting to Steam Labs...</div>
</div>    
    
<div class="container">
    <h1>STEAM LABS</h1>
    <p>Prototype Testing Facility</p>

    <div id="status">Initializing system...</div>

    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>

    <div id="result">
        🤦 Steam Labs Trust Experiment Complete<br><br>
        There was never a prototype.<br><br>
        <strong>You got Steam Labs’d.</strong>
    </div>

    <button onclick="reveal()">Reveal Result</button>
    <button onclick="goToTracking()">Continue to Tracking Portal</button>
</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">
    <h2>Achievement Unlocked</h2>
    <p>Trusting Sibling</p>
    <button onclick="closePopup()">Nice...</button>
</div>

<script>
let progress = 0;

let messages = [
    "Scanning Steam library...",
    "Analyzing playtime...",
    "Checking backlog...",
    "Evaluating gamer behavior...",
    "Detecting curiosity levels..."
];

function updateLoading() {
    let bar = document.getElementById("progress");
    let status = document.getElementById("status");

    if (progress < 100) {
        progress += 10;
        bar.style.width = progress + "%";
        status.innerText = messages[Math.floor(Math.random() * messages.length)];
        setTimeout(updateLoading, 400);
    }
}

setTimeout(() => {
    updateLoading();
}, 2500); // wait until intro fades;

function updateLoading() {
    let bar = document.getElementById("progress");
    let status = document.getElementById("status");

    if (progress < 100) {
        progress += 10;
        bar.style.width = progress + "%";

        let msg = messages[Math.floor(Math.random() * messages.length)];

        // typing effect
        status.innerText = "";
        let i = 0;

        let typer = setInterval(() => {
            status.innerText += msg[i];
            i++;
            if (i >= msg.length) clearInterval(typer);
        }, 20);

        setTimeout(updateLoading, 500);
    }
}
</script>

</body>
</html>
