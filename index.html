<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steam Labs Prototype Testing Facility</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d0d0f;
        color: #f2f2f2;
        text-align: center;
        overflow-x: hidden;
    }

    .container {
        max-width: 800px;
        margin: auto;
        padding: 40px;
    }

    h1 {
        color: #ffd166;
        margin-bottom: 10px;
    }

    #status {
        font-size: 1.2em;
        margin-top: 20px;
        color: #06d6a0;
        min-height: 40px;
    }

    .bar {
        width: 100%;
        background: #222;
        border-radius: 10px;
        margin-top: 20px;
        overflow: hidden;
    }

    .progress {
        width: 0%;
        height: 20px;
        background: #4cc9f0;
        transition: width 0.5s;
    }

    #result {
        display: none;
        margin-top: 30px;
        font-size: 1.4em;
        color: #ffd166;
    }

    button {
        margin-top: 20px;
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ff4d4d;
        color: white;
        font-size: 16px;
    }

    button:hover {
        background: #ff1a1a;
    }

    /* Popup */
    .popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1e1e1e;
        padding: 25px;
        border-radius: 10px;
        border: 2px solid #ff4d4d;
        z-index: 1000;
    }

    .overlay {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0,0,0,0.6);
        z-index: 999;
    }

    /* Confetti */
    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        top: -10px;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<script>
let progress = 0;

let messages = [
    "Scanning Steam library...",
    "Analyzing playtime...",
    "Checking backlog...",
    "Evaluating gamer behavior...",
    "Detecting curiosity levels..."
];

function updateLoading() {
    let bar = document.getElementById("progress");
    let status = document.getElementById("status");

    if (progress < 100) {
        progress += 10;
        bar.style.width = progress + "%";
        status.innerText = messages[Math.floor(Math.random() * messages.length)];
        setTimeout(updateLoading, 400);
    }
}

updateLoading();

function reveal() {
    document.getElementById("result").style.display = "block";
    launchConfetti();
    showPopup();
}

function goToTracking() {
    window.location.href = "tracking.html";
}

/* Popup */
function showPopup() {
    document.getElementById("overlay").style.display = "block";
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("popup").style.display = "none";
}

/* Confetti */
function launchConfetti() {
    const colors = ["#ff4d4d","#ffd166","#06d6a0","#4cc9f0","#f72585"];

    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 5000);
    }
}
</script>

</body>
</html>
